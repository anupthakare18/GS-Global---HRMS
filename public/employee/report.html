<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Report - HRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50">

    <div class="dashboard-layout">
        <aside id="sidebar" class="sidebar-container shadow-xl lg:shadow-none"></aside>

        <main class="main-content">
            <header id="header" class="top-header shadow-sm"></header>

            <div class="content-area max-w-3xl mx-auto">

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="px-8 py-6 border-b border-gray-100 bg-blue-50 flex items-center justify-between">
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800">Submit Daily Report</h2>
                            <p class="text-sm text-gray-600 mt-1">End of day summary of your tasks.</p>
                        </div>
                        <i class="fas fa-clipboard-list text-4xl text-blue-200"></i>
                    </div>

                    <form id="reportForm" class="p-8 space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Report Date</label>
                            <input type="date" id="reportDate" required
                                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 bg-gray-50 cursor-not-allowed"
                                readonly>
                            <p class="text-xs text-gray-500 mt-1">Reports are always submitted for the current day.</p>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Work Summary <span
                                    class="text-red-500">*</span></label>
                            <textarea id="workSummary" rows="5" required
                                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                                placeholder="What did you accomplish today? Please be descriptive..."></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Notes / Blockers
                                (Optional)</label>
                            <textarea id="notes" rows="3"
                                class="block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                                placeholder="Any issues you faced or assistance required?"></textarea>
                        </div>

                        <div class="pt-4 border-t border-gray-100 flex justify-end">
                            <button type="submit"
                                class="inline-flex items-center justify-center py-3 px-6 border border-transparent rounded-lg shadow-sm text-base font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                                <i class="fas fa-paper-plane mr-2"></i> Submit Report
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = requireAuth('employee');
            if (!user) return;

            renderSidebar('employee');
            renderHeader('Daily Report');

            // Set current date
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('reportDate').value = today;

            document.getElementById('reportForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const work_summary = document.getElementById('workSummary').value;
                const notes = document.getElementById('notes').value;

                try {
                    await fetchAPI('/reports/submit', {
                        method: 'POST',
                        body: JSON.stringify({
                            employee_id: user.id,
                            date: today,
                            work_summary,
                            notes
                        })
                    });

                    showToast('Daily report submitted successfully!');
                    e.target.reset();
                    document.getElementById('reportDate').value = today;

                    // Optional redirect after submit
                    setTimeout(() => {
                        window.location.href = '/employee/dashboard.html';
                    }, 1500);
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });
        });
    </script>
</body>

</html>
