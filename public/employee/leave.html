<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leave Management - HRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50">

    <div class="dashboard-layout">
        <aside id="sidebar" class="sidebar-container shadow-xl lg:shadow-none"></aside>

        <main class="main-content">
            <header id="header" class="top-header shadow-sm"></header>

            <div class="content-area max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">

                <!-- Apply Leave Form -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 sticky top-24">
                        <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-4">Apply for Leave</h2>

                        <form id="leaveForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Leave Type</label>
                                <select id="leaveType" required
                                    class="block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                    <option value="">Select Type</option>
                                    <option value="Sick">Sick Leave</option>
                                    <option value="Casual">Casual Leave</option>
                                    <option value="Paid">Paid Leave</option>
                                    <option value="Unpaid">Unpaid Leave</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
                                    <input type="date" id="startDate" required
                                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
                                    <input type="date" id="endDate" required
                                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Reason</label>
                                <textarea id="reason" rows="3" required
                                    class="block w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="Brief reason for leave..."></textarea>
                            </div>

                            <button type="submit"
                                class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                                Submit Application
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Leave History -->
                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                            <h2 class="text-xl font-bold text-gray-800">Leave History</h2>
                            <button onclick="loadLeaveHistory()" class="text-sm text-blue-600 hover:text-blue-800"><i
                                    class="fas fa-sync-alt"></i> Refresh</button>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="min-w-full divide-y divide-gray-200">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Type</th>
                                        <th
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Duration</th>
                                        <th
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider hidden md:table-cell">
                                            Reason</th>
                                        <th
                                            class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                            Status</th>
                                    </tr>
                                </thead>
                                <tbody id="leaveHistoryTable" class="bg-white divide-y divide-gray-200">
                                    <tr>
                                        <td colspan="4" class="px-6 py-4 text-center text-sm text-gray-500">Loading
                                            history...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = requireAuth('employee');
            if (!user) return;

            renderSidebar('employee');
            renderHeader('Leave Management');

            // Apply leave
            document.getElementById('leaveForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const leaveType = document.getElementById('leaveType').value;
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                const reason = document.getElementById('reason').value;

                if (new Date(startDate) > new Date(endDate)) {
                    return showToast('End date must be after start date', 'error');
                }

                try {
                    await fetchAPI('/leaves/apply', {
                        method: 'POST',
                        body: JSON.stringify({
                            employee_id: user.id,
                            leave_type: leaveType,
                            start_date: startDate,
                            end_date: endDate,
                            reason
                        })
                    });

                    showToast('Leave application submitted!');
                    e.target.reset();
                    loadLeaveHistory();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });

            // Load history
            window.loadLeaveHistory = async function () {
                const tbody = document.getElementById('leaveHistoryTable');
                try {
                    const data = await fetchAPI(`/leaves/history/${user.id}`);

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-8 text-center text-gray-500"><i class="fas fa-calendar-times text-4xl mb-3 text-gray-300 block"></i> No leave history found</td></tr>';
                        return;
                    }

                    tbody.innerHTML = data.map(leave => {
                        let statusColor = 'bg-yellow-100 text-yellow-800';
                        if (leave.status === 'approved') statusColor = 'bg-green-100 text-green-800';
                        if (leave.status === 'rejected') statusColor = 'bg-red-100 text-red-800';

                        return `
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="font-medium text-gray-900">${leave.leave_type}</div>
                                    <div class="text-xs text-gray-500">Applied: ${new Date(leave.created_at).toLocaleDateString()}</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <div class="text-sm text-gray-900">${leave.start_date}</div>
                                    <div class="text-xs text-gray-500">to ${leave.end_date}</div>
                                </td>
                                <td class="px-6 py-4 hidden md:table-cell">
                                    <div class="text-sm text-gray-900 line-clamp-2">${leave.reason}</div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full capitalize ${statusColor}">
                                        ${leave.status}
                                    </span>
                                </td>
                            </tr>
                        `;
                    }).join('');
                } catch (err) {
                    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-red-500">Error loading data</td></tr>`;
                }
            };

            loadLeaveHistory();
        });
    </script>
</body>

</html>
