<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Report - HRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50">

    <div class="dashboard-layout">
        <aside id="sidebar" class="sidebar-container shadow-xl lg:shadow-none"></aside>

        <main class="main-content">
            <header id="header" class="top-header shadow-sm"></header>

            <div class="content-area">

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div
                        class="p-6 border-b border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50/50 gap-4">
                        <h2 class="text-xl font-bold text-gray-800">Attendance Records</h2>

                        <div class="flex flex-wrap items-center gap-3">
                            <input type="date" id="filterDate"
                                class="px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 text-sm">
                            <button onclick="loadAttendance()"
                                class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                                Filter
                            </button>
                            <button onclick="document.getElementById('filterDate').value=''; loadAttendance()"
                                class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                                Clear
                            </button>
                            <button onclick="exportToExcel('attendance')"
                                class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm ml-2">
                                <i class="fas fa-file-excel mr-2"></i> Export
                            </button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Date</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Employee</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Punch In</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Punch Out</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Status</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceTable" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td colspan="5" class="px-6 py-4 text-center">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = requireAuth('admin');
            if (!user) return;

            renderSidebar('admin');
            renderHeader('Employee Attendance');

            // Default to today
            document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];
            loadAttendance();
        });

        async function loadAttendance() {
            const tbody = document.getElementById('attendanceTable');
            const date = document.getElementById('filterDate').value;

            try {
                const url = date ? `/attendance?date=${date}` : '/attendance';
                const records = await fetchAPI(url);

                if (records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-8 text-center text-gray-500">No attendance records found for this date.</td></tr>';
                    return;
                }

                tbody.innerHTML = records.map(record => {
                    const statusText = record.punch_out ? 'Completed' : 'Working';
                    const statusColor = record.punch_out ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800';

                    return `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${record.date}</td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-gray-900">${record.name}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                <span class="bg-gray-100 px-2 py-1 rounded text-xs font-mono">${record.punch_in}</span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                ${record.punch_out ? `<span class="bg-gray-100 px-2 py-1 rounded text-xs font-mono">${record.punch_out}</span>` : '<span class="text-gray-400 italic">--:--:--</span>'}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">
                                    ${statusText}
                                </span>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Error loading attendance</td></tr>';
            }
        }

        async function exportToExcel(type) {
            try {
                const blob = await fetchAPI(`/export/${type}`);
                downloadBlob(blob, `${type}_report.xlsx`);
                showToast('Export successful');
            } catch (error) {
                showToast('Failed to export data', 'error');
            }
        }
    </script>
</body>

</html>
