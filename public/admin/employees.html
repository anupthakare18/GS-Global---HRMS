<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Employees - HRMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50">

    <div class="dashboard-layout">
        <aside id="sidebar" class="sidebar-container shadow-xl lg:shadow-none"></aside>

        <main class="main-content">
            <header id="header" class="top-header shadow-sm"></header>

            <div class="content-area">

                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        <h2 class="text-xl font-bold text-gray-800">Employee List</h2>
                        <button onclick="openModal()"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
                            <i class="fas fa-plus mr-2"></i> Add Employee
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="min-w-full divide-y divide-gray-200">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Name</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Email</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Role</th>
                                    <th
                                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Department</th>
                                    <th
                                        class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody id="employeeTable" class="bg-white divide-y divide-gray-200">
                                <tr>
                                    <td colspan="5" class="px-6 py-4 text-center">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Add/Edit Employee Modal -->
    <div id="employeeModal"
        class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md mx-4 transform transition-all">
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <h3 id="modalTitle" class="text-lg font-bold text-gray-900">Add New Employee</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>

            <form id="employeeForm" class="p-6 space-y-4">
                <input type="hidden" id="empId">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="empName" required
                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div id="emailContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email <span
                            class="text-xs text-gray-400">(Used for login)</span></label>
                    <input type="email" id="empEmail" required
                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div id="passwordContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="empPassword" required
                        class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Role</label>
                        <select id="empRole"
                            class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                            <option value="employee">Employee</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Department</label>
                        <input type="text" id="empDept" required
                            class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <div class="pt-4 flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()"
                        class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Cancel</button>
                    <button type="submit"
                        class="px-4 py-2 border border-transparent rounded-lg shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = requireAuth('admin');
            if (!user) return;

            renderSidebar('admin');
            renderHeader('Employee Management');

            loadEmployees();

            document.getElementById('employeeForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const id = document.getElementById('empId').value;
                const name = document.getElementById('empName').value;
                const email = document.getElementById('empEmail').value;
                const password = document.getElementById('empPassword').value;
                const role = document.getElementById('empRole').value;
                const department = document.getElementById('empDept').value;

                try {
                    if (id) {
                        // Update
                        await fetchAPI(`/employees/${id}`, {
                            method: 'PUT',
                            body: JSON.stringify({ name, role, department })
                        });
                        showToast('Employee updated successfully');
                    } else {
                        // Create
                        await fetchAPI('/employees', {
                            method: 'POST',
                            body: JSON.stringify({ name, email, password, role, department })
                        });
                        showToast('Employee added successfully');
                    }
                    closeModal();
                    loadEmployees();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            });
        });

        async function loadEmployees() {
            const tbody = document.getElementById('employeeTable');
            try {
                const employees = await fetchAPI('/employees');

                tbody.innerHTML = employees.map(emp => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center">
                                <div class="flex-shrink-0 h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold mr-3">
                                    ${emp.name.charAt(0).toUpperCase()}
                                </div>
                                <div class="text-sm font-medium text-gray-900">${emp.name}</div>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${emp.email}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${emp.role === 'admin' ? 'bg-purple-100 text-purple-800' : 'bg-green-100 text-green-800'} capitalize">
                                ${emp.role}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${emp.department || '-'}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-center text-sm font-medium">
                            <button onclick='editEmployee(${JSON.stringify(emp).replace(/'/g, "&#39;")})' class="text-indigo-600 hover:text-indigo-900 mx-2 bg-indigo-50 p-2 rounded-md"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteEmployee(${emp.id})" class="text-red-600 hover:text-red-900 mx-2 bg-red-50 p-2 rounded-md"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-4 text-center text-red-500">Error loading employees</td></tr>';
            }
        }

        const modal = document.getElementById('employeeModal');
        const form = document.getElementById('employeeForm');

        function openModal() {
            form.reset();
            document.getElementById('empId').value = '';
            document.getElementById('modalTitle').textContent = 'Add New Employee';
            document.getElementById('emailContainer').style.display = 'block';
            document.getElementById('passwordContainer').style.display = 'block';
            document.getElementById('empEmail').required = true;
            document.getElementById('empPassword').required = true;
            modal.classList.remove('hidden');
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        function editEmployee(emp) {
            document.getElementById('empId').value = emp.id;
            document.getElementById('empName').value = emp.name;
            document.getElementById('empRole').value = emp.role;
            document.getElementById('empDept').value = emp.department || '';

            document.getElementById('modalTitle').textContent = 'Edit Employee';
            // Hide email/pwd for edit for simplicity
            document.getElementById('emailContainer').style.display = 'none';
            document.getElementById('passwordContainer').style.display = 'none';
            document.getElementById('empEmail').required = false;
            document.getElementById('empPassword').required = false;

            modal.classList.remove('hidden');
        }

        async function deleteEmployee(id) {
            const currentUser = getSavedUser();
            if (id === currentUser.id) {
                return showToast("You cannot delete your own account", "error");
            }
            if (confirm('Are you sure you want to delete this employee?')) {
                try {
                    await fetchAPI(`/employees/${id}`, { method: 'DELETE' });
                    showToast('Employee deleted successfully');
                    loadEmployees();
                } catch (err) {
                    showToast(err.message, 'error');
                }
            }
        }
    </script>
</body>

</html>
